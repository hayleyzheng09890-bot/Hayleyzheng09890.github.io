<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简历 - 联系我</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-logo">
                <a href="index.html">
                    <span class="logo-text">Resume</span>
                </a>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">首页</a>
                <a href="internship.html" class="nav-link">实习经历</a>
                <a href="practice.html" class="nav-link">实践经历</a>
                <a href="contact.html" class="nav-link active">联系我</a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="main-content contact-page">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1>联系我</h1>
        </div>

        <!-- 联系方式模块 -->
        <section class="contact-info-section fade-in-section">
            <div class="container">
                <div class="contact-info-grid">
                    <a href="mailto:zhangsan@example.com" class="contact-item">
                        <div class="contact-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="contact-details">
                            <span class="contact-label">邮箱</span>
                            <span class="contact-value">3132900634@qq.com</span>
                        </div>
                    </a>
                    <a href="tel:+8613800138000" class="contact-item">
                        <div class="contact-icon">
                            <i class="fas fa-phone"></i>
                        </div>
                        <div class="contact-details">
                            <span class="contact-label">电话</span>
                            <span class="contact-value">+86 19147952230</span>
                        </div>
                    </a>
                    <a href="https://github.com/zhangsan" target="_blank" class="contact-item">
                        <div class="contact-icon">
                            <i class="fab fa-github"></i>
                        </div>
                        <div class="contact-details">
                            <span class="contact-label">GitHub</span>
                            <span class="contact-value">github.com/zhangsan</span>
                        </div>
                    </a>
                    <div class="contact-item">
                        <div class="contact-icon">
                            <i class="fab fa-weixin"></i>
                        </div>
                        <div class="contact-details">
                            <span class="contact-label">微信</span>
                            <span class="contact-value">z19147952230</span>
                        </div>
                        <div class="wechat-qr">
                            <div class="qr-placeholder">
                                <i class="fas fa-qrcode"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 留言表单模块 -->
        <section class="contact-form-section fade-in-section">
            <div class="container">
                <h2 class="section-title">留言表单</h2>
                <form id="contactForm" class="contact-form">
                    <div class="form-group">
                        <label for="name">姓名 *</label>
                        <input type="text" id="name" name="name" placeholder="请输入您的姓名" required>
                        <span class="error-message" id="nameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="email">邮箱 *</label>
                        <input type="email" id="email" name="email" placeholder="请输入您的邮箱" required>
                        <span class="error-message" id="emailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="message">留言内容 *</label>
                        <textarea id="message" name="message" rows="5" placeholder="请输入您的留言" required></textarea>
                        <span class="error-message" id="messageError"></span>
                    </div>
                    <button type="submit" class="submit-btn">提交留言</button>
                    <div class="form-success" id="formSuccess">
                        <i class="fas fa-check-circle"></i>
                        <span>留言提交成功，我会尽快回复您</span>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p class="copyright">© 2026 Hayley - 个人简历网站</p>
            <button class="back-to-top" id="backToTop">
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/contact.js"></script>
</body>
</html>
